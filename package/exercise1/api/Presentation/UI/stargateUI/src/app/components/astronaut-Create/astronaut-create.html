<div class="create-container">
  @if (isSaving) {
    <div class="spinner-container">
      <div class="galaxy-spinner">
        <div class="core"></div>
        <div class="arms"></div>
      </div>
      <p>Initializing new lifeform...</p>
    </div>
  } @else {
    <div class="form-group">
      <label for="name">Name</label>
      <input [(ngModel)]="newAstronaut.name" id="name" name="name" placeholder="Name" required />
    </div>
    <div class="form-group">
      <label for="currentRank">Rank</label>
      <input [(ngModel)]="newAstronaut.currentRank" id="currentRank" name="currentRank" placeholder="Rank" required />
    </div>
    <div class="form-group">
      <label for="currentDutyTitle">Duty Title</label>
      <input
        [(ngModel)]="newAstronaut.currentDutyTitle"
        id="currentDutyTitle"
        name="currentDutyTitle"
        placeholder="Duty Title"
        required
      />
    </div>
    <div class="form-group">
      <label for="careerStartDate">Career Start Date</label>
      <input type="date" id="careerStartDate" [(ngModel)]="newAstronaut.careerStartDate" name="careerStartDate" required />
    </div>

    <div class="actions">
      <button class="save-btn" (click)="saveAstronaut()">Save Astronaut</button>
    </div>
  }
</div>
